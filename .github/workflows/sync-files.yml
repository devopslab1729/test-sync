name: Sync Files
on:
  push:
    branches:
      - main
  pull_request:
    types:
        - opened
        - synchronize
        - edited
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@main
        
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: basivireddy1212
          repositories: test-sync,test
      - name: run
        run: |
          ls -la
          #git clone https://github.com/basivireddy1212/test.git
          #cd test123
          ls -la
          #date=${date +s%}
          #echo $date > date.txt
          #git add date.txt
          #git commit -m "test"
          #git push
          echo "test123 $(date +s%)" > test123.txt
          
      - name: Run GitHub File Sync
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_INSTALLATION_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_LABELS: |
            file-sync
            automerge
          PR_BODY: This is your custom PR Body
          COMMIT_PREFIX: "chore: sync files"
          SKIP_PR: false

          
